name: Todo-CLI CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
    fmt:
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Install Rustfmt
              uses: dtolnay/rust-toolchain@stable
              with:
                components: rustfmt
            
            - name: Check code formatting
              run: cargo fmt -- --check
    clippy:
        runs-on: ubuntu-latest
        steps:
            - name: Check out
              uses: actions/checkout@v4

            - name: Install Clippy
              uses: dtolnay/rust-toolchain@stable
              with:
                components: clippy
            
            - name: Run Clippy
              run: cargo clippy -all-targets --all-features -- -D warnings
    
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Check out
              uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Run tests
              run: cargo test --all-features
